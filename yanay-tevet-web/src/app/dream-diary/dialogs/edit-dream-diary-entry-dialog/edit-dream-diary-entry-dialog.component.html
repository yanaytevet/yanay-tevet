<div class="dialog-container">
    <h2>Edit Dream Entry</h2>

    <div class="mb-3 flex flex-col gap-1">
        <span class="input-label">Title (optional)</span>
        <input
            class="main-input w-full"
            placeholder="Give your dream a title..."
            [formControl]="titleCtrl" />
    </div>

    <div class="mb-3 flex flex-col gap-1">
        <span class="input-label">Dream *</span>
        <textarea
            class="main-input w-full"
            placeholder="Describe your dream..."
            rows="5"
            [formControl]="textCtrl"></textarea>
    </div>

    <div class="mb-4 flex flex-col gap-1">
        <span class="input-label">Date & Time</span>
        <input
            type="datetime-local"
            class="main-input w-full"
            [formControl]="timeCtrl" />
    </div>

    <div class="dialog-buttons-container">
        <span class="flex-1"></span>
        <button type="button" class="btn cancel-btn" (click)="emitClose(null)">Cancel</button>
        <app-confirmation-button
            [disabled]="!canSave"
            [text]="isSaving ? 'Saving...' : 'Save'"
            (clicked)="onConfirm()">
        </app-confirmation-button>
    </div>
</div>
