<ng-template #actionTmpl let-row="row">
        <app-menu-button
                [color]="themeService.darkMode() ? 'gray-100' : 'gray-800'"
                [icon]="bootstrapThreeDotsVertical" [actions]="getActions(row)"></app-menu-button>
</ng-template>

<ng-template #colHeader let-column="column">
    <div class="flex items-center justify-between w-full">
        <span class="flex-1 whitespace-nowrap overflow-hidden truncate"
              [appTooltip]="column.name">{{ column.name }}</span>
        <app-column-filter
                [filter]="column.filter"
                [paginatedDataHandler]="paginatedDataHandler()">
        </app-column-filter>
    </div>
</ng-template>

<!-- ngx-datatable removed: library dropped, pending replacement with a compatible alternative -->
<div class="flex items-center justify-center h-full text-secondary-400 text-[14px] italic">
    Table view temporarily unavailable — library update in progress.
