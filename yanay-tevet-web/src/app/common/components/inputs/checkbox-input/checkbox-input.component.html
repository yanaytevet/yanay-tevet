<div class="flex items-center">
  @if (label() && labelOnLeft()) {
    <span class="inline-flex items-center mr-2">{{ label() }}</span>
  }
  <div class="relative h-5 w-5 border border-gray-300 rounded grid place-items-center transition-colors"
       [class.bg-blue-500]="value() && symbol() === 'v'"
       [class.bg-pink-600]="value() && symbol() === 'x'"
       [class.bg-gray-100]="disabled() && !value()"
       [class.cursor-pointer]="!disabled()"
       (click)="!disabled() && onInput(!value())">
    @if (value()) {
      <span class="text-white text-sm font-bold select-none leading-none">
        @if (symbol() === 'v') {
          ✓
        } @else {
          ✕
        }
      </span>
    }
  </div>
  @if (label() && !labelOnLeft()) {
    <span class="inline-flex items-center ml-2">{{ label() }}</span>
  }
</div>
