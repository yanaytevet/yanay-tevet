<button [cdkMenuTriggerFor]="menu" class="icon-btn">
  @if (icon()) {
    <ng-icon [svg]="icon()"></ng-icon>
  }
  @if (text()) {
    <span class="font-medium text-sm">{{ text() }}</span>
  }
</button>

<ng-template #menu>
  <div cdkMenu class="min-w-[160px] py-1 bg-layer-1 rounded-lg border border-outline-border-1"
       style="box-shadow: rgba(0,0,0,0.04) 0 4px 18px, rgba(0,0,0,0.027) 0 2.025px 7.84688px, rgba(0,0,0,0.02) 0 0.8px 2.925px, rgba(0,0,0,0.01) 0 0.175px 1.04062px; z-index: 9999;">
    @for (action of actions(); track $index) {
      @if (action === SEPARATOR) {
        <div class="h-px my-1 mx-3" style="background: rgba(0,0,0,0.1)"></div>
      } @else {
        <button cdkMenuItem
                (click)="action.callback()"
                [disabled]="action.disabled"
                class="w-full flex items-center gap-2 px-3 py-2 text-left text-sm text-writing hover:bg-layer-2 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
          @if (action.icon) {
            <ng-icon [svg]="action.icon" size="14" class="shrink-0 text-secondary-400"></ng-icon>
          }
          <span>{{ action.display }}</span>
        </button>
      }
    }
  </div>
</ng-template>
