<app-japanese-nav/>

<div class="max-w-5xl mx-auto px-4 py-6">
  <div class="mb-6">
    <h1 class="text-[28px] font-bold text-writing">Japanese</h1>
    <p class="text-[14px] text-writing-minor mt-1">
      Explore a network of passages, sentences, words, kanji, particles, and grammar rules.
    </p>
  </div>

  <app-tabs-group tabsQueryParam="type">
    <app-tab name="passage" label="Passages">
      <app-japanese-explore-grid nodeType="passage"/>
    </app-tab>
    <app-tab name="sentence" label="Sentences">
      <app-japanese-explore-grid nodeType="sentence"/>
    </app-tab>
    <app-tab name="word" label="Words">
      <app-japanese-explore-grid nodeType="word"/>
    </app-tab>
    <app-tab name="kanji" label="Kanji">
      <app-japanese-explore-grid nodeType="kanji"/>
    </app-tab>
    <app-tab name="particle" label="Particles">
      <app-japanese-explore-grid nodeType="particle"/>
    </app-tab>
    <app-tab name="rule" label="Rules">
      <app-japanese-explore-grid nodeType="rule"/>
    </app-tab>
  </app-tabs-group>
</div>
