<div class="max-w-3xl mx-auto px-4 py-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-[28px] font-bold text-writing">Ingest</h1>
      <p class="text-[14px] text-writing-minor mt-1">
        Paste a sentence, word, kanji, particle, or grammar rule. The backend classifies it,
        extracts referenced entities, and generates content for the main node.
      </p>
    </div>
    <a [routerLink]="routingService.getJapaneseReviewUrl()" class="btn btn-secondary">Review queue</a>
  </div>

  <div class="card p-5">
    <span class="block text-[13px] font-semibold text-writing mb-2">Japanese text</span>
    <textarea
      class="main-input w-full"
      rows="4"
      placeholder="例: 私(わたし)は寿司(すし)を食(た)べた。"
      [ngModel]="text()"
      (ngModelChange)="text.set($event)"
      [disabled]="isWorking()"></textarea>

    <div class="flex items-center justify-between mt-4">
      <span class="text-[12px] text-writing-minor">
        Tip: include furigana inline as 漢字(かんじ).
      </span>
      <button
        type="button"
        class="btn btn-primary"
        (click)="onSubmit()"
        [disabled]="isWorking() || !text().trim()">
        @if (isWorking()) { Ingesting… } @else { Ingest }
      </button>
    </div>
  </div>
</div>
