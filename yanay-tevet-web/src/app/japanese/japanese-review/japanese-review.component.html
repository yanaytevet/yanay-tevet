<app-japanese-nav/>

<div class="max-w-5xl mx-auto px-4 py-6">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-[28px] font-bold text-writing">Review Queue</h1>
      <p class="text-[14px] text-writing-minor mt-1">
        Stubs await content generation; needs-review awaits approval.
      </p>
    </div>
    <button type="button" class="btn btn-secondary" (click)="refresh()" [disabled]="isLoading()">
      Refresh
    </button>
  </div>

  @if (error(); as err) {
    <div class="card p-4 mb-6 text-red-700 bg-red-50">{{ err }}</div>
  }

  <section>
    <h2 class="text-[18px] font-semibold mb-3 text-writing">
      Stubs <span class="text-writing-minor text-[14px] font-normal">({{ stubs().length }})</span>
    </h2>
    @if (stubs().length === 0 && !isLoading()) {
      <div class="card p-4 text-writing-minor text-[14px]">No stubs waiting for content.</div>
    }
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      @for (node of stubs(); track node.id) {
        <app-node-summary-card [node]="node" [showStatus]="true"/>
      }
    </div>
  </section>
</div>
