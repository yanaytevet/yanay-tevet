<div class="card overflow-hidden">

  <div
    class="relative group"
    style="height: 200px; background: #040414;"
    [class.cursor-pointer]="!service.isLoading()"
    (click)="onCanvasClick()">
    <canvas #vizCanvas class="w-full h-full block"></canvas>
    @if (service.isPlaying()) {
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity duration-200">
        <p class="text-white/60 text-sm font-medium">Click to stop</p>
      </div>
    }
    @if (!service.isPlaying() && !service.isLoading()) {
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        @if (service.playDisabled()) {
          <p class="text-white/40 text-sm font-medium">Select at least 2 genres in settings</p>
        } @else {
          <p class="text-white/30 text-sm font-medium">Press Play to start</p>
        }
      </div>
    }
    @if (service.isLoading()) {
      <div class="absolute inset-0 flex items-center justify-center">
        <p class="text-white/40 text-sm">Loading track...</p>
      </div>
    }
  </div>

  <div class="px-4 py-3 flex items-center gap-3 border-t border-outline-border-1">

    <!-- Auto-start toggle -->
    <button
      type="button"
      (click)="toggleAutoStart()"
      class="flex items-center gap-1.5 text-xs font-medium text-secondary-400 hover:text-primary-500 transition-colors flex-shrink-0">
      <div
        class="relative w-7 h-3.5 rounded-full transition-colors duration-200"
        [style.background]="service.autoStart() ? '#0075de' : 'rgba(0,0,0,0.12)'">
        <div
          class="absolute top-0.5 w-2.5 h-2.5 bg-white rounded-full shadow-sm transition-all duration-200"
          [style.left]="service.autoStart() ? '15px' : '2px'">
        </div>
      </div>
      Auto
    </button>

    <!-- Volume slider -->
    <div class="flex items-center gap-2 flex-1 min-w-0">
      <svg class="w-3.5 h-3.5 text-secondary-400 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      <input
        type="range"
        min="0"
        max="1"
        step="0.01"
        class="flex-1 h-1 rounded-full accent-blue-500 cursor-pointer"
        [value]="service.volume()"
        (input)="setVolume(+$any($event.target).value)">
      <svg class="w-4 h-4 text-secondary-400 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
    </div>

    <!-- Play / Stop -->
    <button
      type="button"
      class="btn btn-primary px-5 flex-shrink-0 text-sm"
      [disabled]="service.isLoading() || service.playDisabled()"
      (click)="togglePlay()">
      @if (service.isPlaying()) { Stop } @else { Play }
    </button>

    <!-- Settings -->
    <button
      type="button"
      class="p-1.5 rounded-lg text-secondary-400 hover:text-primary-500 hover:bg-black/5 transition-all flex-shrink-0"
      title="Training settings"
      (click)="openConfig()">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.3 7.3 0 00-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54a7.3 7.3 0 00-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.48.48 0 00.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.48.48 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.48.48 0 00-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
      </svg>
    </button>

  </div>

</div>
