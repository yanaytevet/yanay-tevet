<div class="card overflow-hidden">

  <div
    class="relative group"
    style="height: 200px; background: #040414;"
    [class.cursor-pointer]="!service.isLoading()"
    (click)="onCanvasClick()">
    <canvas #vizCanvas class="w-full h-full block"></canvas>
    @if (service.isPlaying()) {
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity duration-200">
        <p class="text-white/60 text-sm font-medium">Click to stop</p>
      </div>
    }
    @if (!service.isPlaying() && !service.isLoading()) {
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        @if (service.playDisabled()) {
          <p class="text-white/40 text-sm font-medium">{{ service.playDisabledMessage() }}</p>
        } @else {
          <p class="text-white/30 text-sm font-medium">Press Play to start</p>
        }
      </div>
    }
    @if (service.isLoading()) {
      <div class="absolute inset-0 flex items-center justify-center">
        <p class="text-white/40 text-sm">Loading track...</p>
      </div>
    }
  </div>

  <div class="px-4 py-3 flex items-center gap-3 border-t border-outline-border-1">

    <!-- Auto-start toggle -->
    <button
      type="button"
      (click)="toggleAutoStart()"
      class="flex items-center gap-1.5 text-xs font-medium text-secondary-400 hover:text-primary-500 transition-colors flex-shrink-0">
      <div
        class="relative w-7 h-3.5 rounded-full transition-colors duration-200"
        [style.background]="service.autoStart() ? '#0075de' : 'rgba(0,0,0,0.12)'">
        <div
          class="absolute top-0.5 w-2.5 h-2.5 bg-white rounded-full shadow-sm transition-all duration-200"
          [style.left]="service.autoStart() ? '15px' : '2px'">
        </div>
      </div>
      Auto
    </button>

    <!-- Volume slider -->
    <div class="flex items-center gap-2 flex-1 min-w-0">
      <span class="hidden sm:flex flex-shrink-0">
        <ng-icon [svg]="bootstrapVolumeDownFill" class="text-secondary-400 text-base" />
      </span>
      <input
        type="range"
        min="0"
        max="1"
        step="0.01"
        class="flex-1 h-1 rounded-full accent-blue-500 cursor-pointer"
        [value]="service.volume()"
        (input)="setVolume(+$any($event.target).value)">
      <span class="hidden sm:flex flex-shrink-0">
        <ng-icon [svg]="bootstrapVolumeUpFill" class="text-secondary-400 text-base" />
      </span>
    </div>

    <!-- Play / Stop -->
    <button
      type="button"
      class="btn btn-primary px-5 flex-shrink-0 text-sm"
      [disabled]="service.isLoading() || service.playDisabled()"
      (click)="togglePlay()">
      @if (service.isPlaying()) { Stop } @else { Play }
    </button>

    <!-- Admin: Download JSON -->
    @if (isAdmin()) {
      <button
        type="button"
        class="p-1.5 rounded-lg text-secondary-400 hover:text-primary-500 hover:bg-black/5 transition-all flex-shrink-0 disabled:opacity-40 disabled:cursor-not-allowed"
        title="Download track JSON (admin)"
        [disabled]="!service.track() || isRecording()"
        (click)="downloadJson()">
        <ng-icon [svg]="bootstrapDownload" class="text-base" />
      </button>

      <!-- Admin: Download audio (records 2 loops) -->
      <button
        type="button"
        class="p-1.5 rounded-lg text-secondary-400 hover:text-primary-500 hover:bg-black/5 transition-all flex-shrink-0 disabled:opacity-40 disabled:cursor-not-allowed"
        title="Download track audio — records 2 loops (admin)"
        [disabled]="!service.track() || isRecording() || service.playDisabled()"
        (click)="downloadAudio()">
        @if (isRecording()) {
          <span class="inline-block w-4 h-4 align-middle rounded-full bg-red-500 animate-pulse"></span>
        } @else {
          <ng-icon [svg]="bootstrapFileMusic" class="text-base" />
        }
      </button>
    }

    <!-- Settings -->
    <button
      type="button"
      class="p-1.5 rounded-lg text-secondary-400 hover:text-primary-500 hover:bg-black/5 transition-all flex-shrink-0"
      title="Training settings"
      (click)="openConfig()">
      <ng-icon [svg]="bootstrapGearFill" class="text-base" />
    </button>

  </div>

</div>
