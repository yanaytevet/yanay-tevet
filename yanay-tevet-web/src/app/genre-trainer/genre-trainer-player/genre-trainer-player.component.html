<div class="card overflow-hidden">

  <div
    class="relative"
    style="height: 200px; background: #040414;"
    [class.cursor-pointer]="!service.isPlaying() && !service.isLoading() && !!service.track()"
    (click)="onCanvasClick()">
    <canvas #vizCanvas class="w-full h-full block"></canvas>
    @if (!service.isPlaying() && !service.isLoading()) {
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <p class="text-white/30 text-sm font-medium">Press Play to start</p>
      </div>
    }
    @if (service.isLoading()) {
      <div class="absolute inset-0 flex items-center justify-center">
        <p class="text-white/40 text-sm">Loading track...</p>
      </div>
    }
  </div>

  <div class="p-4 flex items-center gap-4 border-t border-outline-border-1">

    <!-- Auto-start toggle -->
    <button
      type="button"
      (click)="toggleAutoStart()"
      class="flex items-center gap-2 text-xs font-medium text-secondary-400 hover:text-primary-500 transition-colors flex-shrink-0">
      <div
        class="relative w-8 h-4 rounded-full transition-colors duration-200"
        [style.background]="service.autoStart() ? '#0075de' : 'rgba(0,0,0,0.12)'">
        <div
          class="absolute top-0.5 w-3 h-3 bg-white rounded-full shadow-sm transition-all duration-200"
          [style.left]="service.autoStart() ? '18px' : '2px'">
        </div>
      </div>
      Auto-play
    </button>

    <!-- Volume slider -->
    <div class="flex items-center gap-2 flex-1 min-w-0">
      <svg class="w-3.5 h-3.5 text-secondary-400 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      <input
        type="range"
        min="0"
        max="1"
        step="0.01"
        class="flex-1 h-1 rounded-full accent-blue-500 cursor-pointer"
        [value]="service.volume()"
        (input)="setVolume(+$any($event.target).value)">
      <svg class="w-4 h-4 text-secondary-400 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
      </svg>
    </div>

    <button
      type="button"
      class="btn btn-primary px-6 flex-shrink-0"
      [disabled]="service.isLoading() || service.playDisabled()"
      (click)="togglePlay()">
      @if (service.isPlaying()) { Stop } @else { Play }
    </button>
  </div>

</div>
