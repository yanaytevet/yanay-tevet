<div class="min-h-screen bg-layer-1 pb-16">

  <div class="max-w-3xl mx-auto px-4 pt-12">

    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-primary-500" style="letter-spacing: -1.5px">Genre Trainer</h1>
      <p class="mt-2 text-secondary-400 text-base">Listen and identify the electronic music genre</p>
      @if (service.totalAnswered() > 0) {
        <div class="mt-4 flex items-center justify-center gap-6 text-sm">
          <div class="flex flex-col items-center">
            <span class="text-2xl font-bold text-primary-500">{{ service.streak() }}</span>
            <span class="text-xs text-secondary-400 mt-0.5">Streak</span>
          </div>
          <div class="w-px h-8 bg-black/10"></div>
          <div class="flex flex-col items-center">
            <span class="text-2xl font-bold text-primary-500">{{ service.totalCorrect() }}/{{ service.totalAnswered() }}</span>
            <span class="text-xs text-secondary-400 mt-0.5">Correct</span>
          </div>
        </div>
      }
    </div>

    <app-genre-trainer-player />
    <app-genre-trainer-focus />

    @if (service.error()) {
      <div class="mt-4 p-4 rounded-xl text-sm text-red-700 bg-red-50 border border-red-200">
        {{ service.error() }}
      </div>
    }

    <app-genre-trainer-guess />
    <app-genre-trainer-reveal (nextTrack)="onNextTrack()" />

  </div>
</div>
