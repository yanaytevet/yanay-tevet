@if (service.genres().length > 0) {
  <div class="mt-5 card p-4">
    <div class="flex items-center gap-2 mb-3">
      <span class="text-xs font-semibold text-secondary-400 uppercase tracking-wide">Train on</span>
    </div>
    <div class="flex flex-wrap gap-2">
      <button
        type="button"
        (click)="service.clearFocus()"
        class="px-3 py-1 rounded-full text-xs font-semibold border transition-all duration-150"
        [class]="service.noFocus()
          ? 'bg-[#0075de] border-[#0075de] text-white'
          : 'bg-transparent border-black/10 text-secondary-400 hover:border-black/20'">
        All
      </button>
      @for (genre of service.genres(); track genre) {
        <button
          type="button"
          (click)="service.toggleFocusGenre(genre)"
          class="px-3 py-1 rounded-full text-xs font-semibold border transition-all duration-150"
          [class]="service.focusGenreState()[genre]
            ? 'bg-[#0075de] border-[#0075de] text-white'
            : 'bg-transparent border-black/10 text-secondary-400 hover:border-black/20'">
          {{ service.genreLabelMap()[genre] }}
        </button>
      }
    </div>
  </div>
}
