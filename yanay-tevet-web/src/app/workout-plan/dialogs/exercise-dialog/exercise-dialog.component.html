<div class="card bg-layer-2 p-5 sm:p-6 w-full">

    <div class="flex items-start justify-between mb-5">
        <h2 class="text-[18px] font-bold text-primary-500">{{ data.title }}</h2>
        <button type="button" class="icon-btn text-writing-minor hover:text-writing" (click)="onClose()">
            <ng-icon [svg]="featherX" class="h-5 w-5"></ng-icon>
        </button>
    </div>

    <div class="mb-4 flex flex-col gap-1.5">
        <span class="input-label">Name <span class="text-writing-least">*</span></span>
        <input type="text" dir="auto" class="main-input w-full" placeholder="e.g. Bench Press"
               [formControl]="nameCtrl" (keyup.enter)="onSave()" />
    </div>

    <div class="mb-4 flex flex-col gap-1.5">
        <span class="input-label">Measured by</span>
        <select class="main-input w-full" [formControl]="measurementTypeCtrl">
            @for (type of measurementTypeOrder; track type) {
                <option [value]="type">{{ measurementTypeLabels[type] }}</option>
            }
        </select>
    </div>

    <div class="mb-4 flex flex-col gap-2">
        <div class="flex items-center justify-between">
            <span class="input-label">Sets</span>
            <button type="button" class="flex items-center gap-1 text-[13px] text-notion-blue hover:underline"
                    (click)="addSet()">
                <ng-icon [svg]="featherPlus" class="h-3.5 w-3.5"></ng-icon>
                Add set
            </button>
        </div>

        @if (sets().length === 0) {
            <p class="text-[13px] text-writing-minor py-2">No sets yet. Add one to record what you do.</p>
        } @else {
            <div class="flex flex-col gap-2">
                @for (set of sets(); track $index) {
                    <div class="flex items-center gap-3">
                        <span class="text-[12px] text-writing-minor w-12 shrink-0">Set {{ $index + 1 }}</span>
                        @if (isReps()) {
                            <input type="number" min="0" inputmode="numeric" class="main-input flex-1"
                                   placeholder="Reps" [value]="set.reps" (input)="updateReps($index, $event)" />
                            <span class="text-[12px] text-writing-minor w-10 shrink-0">reps</span>
                        } @else {
                            <input type="number" min="0" inputmode="numeric" class="main-input flex-1"
                                   placeholder="Seconds" [value]="set.durationSeconds"
                                   (input)="updateDuration($index, $event)" />
                            <span class="text-[12px] text-writing-minor w-10 shrink-0">sec</span>
                        }
                        <button type="button" class="icon-btn text-writing-minor hover:text-writing shrink-0"
                                (click)="removeSet($index)">
                            <ng-icon [svg]="featherTrash2" class="h-4 w-4"></ng-icon>
                        </button>
                    </div>
                }
            </div>
        }
    </div>

    <div class="mb-2 flex flex-col gap-1.5">
        <span class="input-label">Notes</span>
        <textarea class="main-input w-full leading-relaxed" rows="2" dir="auto"
                  placeholder="Optional notes (weight, tempo, form cues...)"
                  [formControl]="notesCtrl"></textarea>
    </div>

    <div class="flex items-center justify-end gap-2 mt-6">
        <button type="button" class="btn cancel-btn" (click)="onClose()">Cancel</button>
        <button type="button" class="btn btn-primary" [disabled]="!canSave()" (click)="onSave()">
            {{ data.confirmActionName }}
        </button>
    </div>
</div>
