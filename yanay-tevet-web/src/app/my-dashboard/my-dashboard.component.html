<div class="min-h-screen bg-layer-1 pb-16">
  <div class="max-w-5xl mx-auto px-4 pt-12">

    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-4xl font-bold text-primary-500" style="letter-spacing: -1.5px">My Dashboard</h1>
        <p class="mt-2 text-secondary-400 text-base">Live status from the services I depend on</p>
      </div>
      <button
        type="button"
        class="btn btn-secondary flex items-center gap-2"
        (click)="refreshAll()">
        <ng-icon [svg]="bootstrapArrowClockwise" class="text-base" />
        Refresh
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <app-openai-credits-card />
    </div>

  </div>
</div>
