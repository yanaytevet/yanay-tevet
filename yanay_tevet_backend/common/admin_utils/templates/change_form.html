{% extends "admin/change_form.html" %}

{% block form_top %}
    {{ block.super }}

    {% if change and action_buttons %}
        <div class="submit-row">
            {% for action_button in action_buttons %}
                <input
                        type="submit"
                            class="button"
                        value="{{ action_button.name }}"
                        name="{{ action_button.label }}"
                >
            {% endfor %}
        </div>
    {% endif %}
{% endblock %}
