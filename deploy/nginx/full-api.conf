server {
  listen 80;
  server_name api.yanaytevet.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name api.yanaytevet.com;

  ssl_certificate     /etc/ssl/cf/origin.pem;
  ssl_certificate_key /etc/ssl/cf/origin.key;

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  # Serve static files directly (includes /static/admin/*)
  location ^~ /static/ {
    alias /static/;
    access_log off;
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # Allow large file uploads (images)
  client_max_body_size 20m;

  # Everything else (including /admin/) goes to the backend
  location / {
    proxy_pass http://yanay_tevet_backend:8000;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # WebSockets
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
