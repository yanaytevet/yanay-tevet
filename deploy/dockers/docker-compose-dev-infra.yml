#    ports:
#      - "5672:5672"
#    volumes:
#      - rabbitmq_data:/var/lib/rabbitmq
#    expose:
#      - 5672
#    restart: on-failure
#    networks:
#      - common-network

volumes:
  db_data:
#  rabbitmq_data:
  logs:

networks:
  common-network:
    driver: bridge
    name: common-network